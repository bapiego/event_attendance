<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendly - Check-In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f4f6f9;
    color: #1a202c;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
    color: white;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  header h1 { font-size: 18px; font-weight: 600; }
  header .event-name { font-size: 13px; opacity: 0.85; }

  header .user-info {
    font-size: 13px;
    opacity: 0.85;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header button#logoutBtn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  header button#logoutBtn:hover { background: rgba(255,255,255,0.25); }

  .summary-bar {
    background: white;
    padding: 16px 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    border-bottom: 1px solid #e2e8f0;
  }

  .summary-stat { text-align: left; }
  .summary-stat .num { font-size: 24px; font-weight: 700; color: #2c5282; }
  .summary-stat .label { font-size: 12px; color: #718096; }

  .container { max-width: 700px; margin: 0 auto; padding: 20px; }

  .search-wrap { position: relative; margin-bottom: 8px; }

  #searchInput {
    width: 100%; padding: 14px 16px; font-size: 16px;
    border: 2px solid #e2e8f0; border-radius: 12px; background: white;
  }
  #searchInput:focus { outline: none; border-color: #2c5282; }

  .empty-state { text-align: center; color: #a0aec0; padding: 60px 20px; font-size: 14px; }

  .result-card {
    background: white; border-radius: 14px; padding: 18px;
    margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .result-card.checked-in { border-left: 4px solid #38a169; }

  .result-card .name { font-size: 17px; font-weight: 700; margin-bottom: 10px; }

  .result-card .details { font-size: 13px; color: #4a5568; line-height: 1.7; }
  .result-card .details .field-row { display: block; }
  .result-card .details .field-label { color: #a0aec0; font-weight: 600; margin-right: 4px; }

  .check-in-btn {
    background: #2c5282; color: white; border: none; padding: 10px 20px;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap;
  }
  .check-in-btn:hover { background: #1e3a5f; }

  .checked-status { display: flex; align-items: center; gap: 8px; }
  .checked-status .check-icon { color: #38a169; font-size: 14px; font-weight: 700; }

  .undo-btn, .edit-btn {
    background: none; border: 1px solid #e2e8f0; color: #a0aec0;
    padding: 6px 12px; border-radius: 8px; font-size: 12px; cursor: pointer;
  }
  .undo-btn:hover { border-color: #cbd5e0; color: #718096; }
  .edit-btn { color: #2c5282; border-color: #cbd5e0; font-weight: 600; }
  .edit-btn:hover { background: #f0f7ff; }

  .action-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

  .add-new-btn {
    background: #f0f7ff; color: #2c5282; border: 1.5px dashed #bee3f8;
    border-radius: 10px; padding: 14px; font-size: 14px; font-weight: 600;
    cursor: pointer; width: 100%; margin-top: 8px;
  }
  .add-new-btn:hover { background: #e0eeff; }

  .modal-overlay {
    display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
  }
  .modal-overlay.active { display: flex; }

  .modal-box {
    background: white; border-radius: 16px; padding: 28px;
    width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
  }
  .modal-box h2 { font-size: 18px; margin-bottom: 4px; }
  .modal-box p.sub { font-size: 13px; color: #718096; margin-bottom: 20px; }

  .modal-box label {
    display: block; font-size: 12px; font-weight: 600; color: #4a5568;
    margin-bottom: 5px; margin-top: 14px;
  }
  .modal-box input {
    width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0;
    border-radius: 8px; font-size: 14px;
  }
  .modal-box input:focus { outline: none; border-color: #2c5282; }

  .modal-actions { display: flex; gap: 10px; margin-top: 24px; }
  .modal-actions button {
    flex: 1; padding: 12px; border-radius: 8px; font-size: 14px;
    font-weight: 600; cursor: pointer; border: none;
  }
  .btn-cancel { background: #f1f5f9; color: #4a5568; }
  .btn-cancel:hover { background: #e2e8f0; }
  .btn-confirm { background: #2c5282; color: white; }
  .btn-confirm:hover { background: #1e3a5f; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a202c; color: white; padding: 12px 24px; border-radius: 10px;
    font-size: 14px; z-index: 200; display: none;
  }
  .toast.success { background: #2f855a; }
  .toast.error { background: #c53030; }

  .app-footer { text-align: center; padding: 16px; font-size: 12px; color: #a0aec0; }
</style>
</head>
<body>

<header>
  <div>
    <h1>Attendly Check-In</h1>
    <div class="event-name" id="eventNameLabel"></div>
  </div>
  <div class="user-info">
    <span id="loggedInAs"></span>
    <button id="logoutBtn">Log Out</button>
  </div>
</header>

<div class="summary-bar" id="summaryBar">
  <div class="summary-stat">
    <div class="num" id="totalCheckedIn">–</div>
    <div class="label">Checked In</div>
  </div>
</div>

<div class="container">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search attendees..." autocomplete="off">
  </div>

  <div id="resultsArea">
    <div class="empty-state">Start typing a name or other detail to find an attendee.</div>
  </div>
</div>

<!-- Add/Edit attendee modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h2 id="modalTitle">Add New Attendee</h2>
    <p class="sub" id="modalSub">No match found — fill in their details to check them in.</p>

    <div id="modalFieldsContainer"></div>

    <div class="modal-actions">
      <button class="btn-cancel" id="cancelModalBtn">Cancel</button>
      <button class="btn-confirm" id="confirmModalBtn">Add & Check In</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<p class="app-footer">Powered by Bapiego</p>

<script>
  const SUPABASE_URL = 'https://ydijisbsoqqbcjssscck.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_PLI1DLUB_0DF3R0x3GPWYA_RNj2aScg';

  const sessionToken = localStorage.getItem('session_token');
  const eventId = localStorage.getItem('event_id');

  let eventFields = [];
  let debounceTimer = null;
  let currentSearchTerm = '';
  let editingAttendeeId = null;

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.clear();
    window.location.href = 'login.html';
  });

  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type}`;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
  }

  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  async function callRPC(functionName, payload) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${functionName}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify(payload)
      });
      return await res.json();
    } catch (err) {
      return { success: false, error: 'Connection failure' };
    }
  }

  // ---------- Load event field definitions ----------
  async function loadEventFields() {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_event_fields`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ p_event_id: eventId })
    });
    eventFields = await res.json();
  }

  function getNameField() {
    return eventFields.find(f => f.is_name_field);
  }

  // ---------- Summary ----------
  async function loadSummary() {
    const res = await callRPC('get_event_attendance_metrics', { p_token: sessionToken, p_event_id: eventId });
    if (res.success) {
      document.getElementById('totalCheckedIn').textContent = `${res.total_checked_in} / ${res.total_registered}`;
    }
  }

  // ---------- Search ----------
  const searchInput = document.getElementById('searchInput');
  const resultsArea = document.getElementById('resultsArea');

  searchInput.addEventListener('input', () => {
    const query = searchInput.value.trim();
    currentSearchTerm = query;
    clearTimeout(debounceTimer);

    if (query.length === 0) {
      resultsArea.innerHTML = '<div class="empty-state">Start typing a name or other detail to find an attendee.</div>';
      return;
    }
    debounceTimer = setTimeout(() => runSearch(query), 250);
  });

  async function runSearch(query) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/search_attendees`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ p_token: sessionToken, p_event_id: eventId, p_search_term: query })
    });

    if (!res.ok) {
      resultsArea.innerHTML = '<div class="empty-state">Search failed. Please try again.</div>';
      return;
    }

    const results = await res.json();
    renderResults(Array.isArray(results) ? results : [], query);
  }

  function renderResults(results, query) {
    if (results.length === 0) {
      resultsArea.innerHTML = `
        <div class="empty-state">
          No attendee found matching "${escapeHtml(query)}".
        </div>
        <button class="add-new-btn" id="addNewFromEmptyBtn">+ Add "${escapeHtml(query)}" as a new attendee</button>
      `;
      document.getElementById('addNewFromEmptyBtn').addEventListener('click', () => openAddModal(query));
      return;
    }

    resultsArea.innerHTML = '';
    results.forEach(person => resultsArea.appendChild(buildResultCard(person)));

    const addBtn = document.createElement('button');
    addBtn.className = 'add-new-btn';
    addBtn.textContent = `+ Add "${query}" as a new attendee instead`;
    addBtn.addEventListener('click', () => openAddModal(query));
    resultsArea.appendChild(addBtn);
  }

  function buildResultCard(person) {
    const card = document.createElement('div');
    card.className = `result-card ${person.checked_in ? 'checked-in' : ''}`;

    const nameField = getNameField();
    const displayName = nameField ? (person.data[nameField.field_key] || '(no name)') : '(no name)';

    let detailsHtml = '';
    eventFields.forEach(f => {
      if (f.is_name_field) return;
      const value = person.data[f.field_key];
      if (value) {
        detailsHtml += `<div class="field-row"><span class="field-label">${escapeHtml(f.field_label)}:</span>${escapeHtml(value)}</div>`;
      }
    });

    card.innerHTML = `
      <div class="name">${escapeHtml(displayName)}</div>
      <div class="details">${detailsHtml}</div>
      <div class="action-row"></div>
    `;

    const actionRow = card.querySelector('.action-row');

    if (person.checked_in) {
      const checkedAt = person.checked_in_at ? new Date(person.checked_in_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
      const statusDiv = document.createElement('div');
      statusDiv.className = 'checked-status';
      statusDiv.innerHTML = `<span class="check-icon">✓ Checked in${checkedAt ? ' at ' + checkedAt : ''}</span>`;
      actionRow.appendChild(statusDiv);

      const undoBtn = document.createElement('button');
      undoBtn.className = 'undo-btn';
      undoBtn.textContent = 'Undo';
      undoBtn.addEventListener('click', () => toggleCheckIn(person.id, false));
      actionRow.appendChild(undoBtn);
    } else {
      const btn = document.createElement('button');
      btn.className = 'check-in-btn';
      btn.textContent = 'Check In';
      btn.addEventListener('click', () => toggleCheckIn(person.id, true));
      actionRow.appendChild(btn);
    }

    const editBtn = document.createElement('button');
    editBtn.className = 'edit-btn';
    editBtn.textContent = 'Edit';
    editBtn.addEventListener('click', () => openEditModal(person));
    actionRow.appendChild(editBtn);

    return card;
  }

  async function toggleCheckIn(attendeeId, checkedIn) {
    const res = await callRPC('toggle_attendee_checkin', {
      p_token: sessionToken,
      p_attendee_id: attendeeId,
      p_checked_in: checkedIn
    });

    if (res.success) {
      showToast(checkedIn ? 'Checked in' : 'Check-in undone');
      loadSummary();
      if (currentSearchTerm) runSearch(currentSearchTerm);
    } else {
      showToast(res.error || 'Action failed', 'error');
    }
  }

  // ---------- Add/Edit modal ----------
  const modalOverlay = document.getElementById('modalOverlay');

  function renderModalFields(prefillData) {
    const container = document.getElementById('modalFieldsContainer');
    container.innerHTML = '';

    eventFields.forEach(f => {
      const label = document.createElement('label');
      label.textContent = f.field_label + (f.is_name_field ? ' (required)' : '');
      const input = document.createElement('input');
      input.type = 'text';
      input.id = `modal_field_${f.field_key}`;
      input.value = (prefillData && prefillData[f.field_key]) || '';
      container.appendChild(label);
      container.appendChild(input);
    });
  }

  function openAddModal(prefillName) {
    editingAttendeeId = null;
    document.getElementById('modalTitle').textContent = 'Add New Attendee';
    document.getElementById('modalSub').textContent = 'No match found — fill in their details to check them in.';
    document.getElementById('confirmModalBtn').textContent = 'Add & Check In';

    const nameField = getNameField();
    const prefill = {};
    if (nameField) prefill[nameField.field_key] = prefillName || '';
    renderModalFields(prefill);

    modalOverlay.classList.add('active');
  }

  function openEditModal(person) {
    editingAttendeeId = person.id;
    document.getElementById('modalTitle').textContent = 'Edit Attendee';
    document.getElementById('modalSub').textContent = 'Update their details below.';
    document.getElementById('confirmModalBtn').textContent = 'Save Changes';
    renderModalFields(person.data);
    modalOverlay.classList.add('active');
  }

  function closeModal() {
    modalOverlay.classList.remove('active');
    editingAttendeeId = null;
  }

  document.getElementById('cancelModalBtn').addEventListener('click', closeModal);

  document.getElementById('confirmModalBtn').addEventListener('click', async () => {
    const nameField = getNameField();
    const data = {};
    eventFields.forEach(f => {
      data[f.field_key] = document.getElementById(`modal_field_${f.field_key}`).value.trim();
    });

    if (nameField && !data[nameField.field_key]) {
      showToast('Name is required', 'error');
      return;
    }

    if (editingAttendeeId) {
      const res = await callRPC('update_attendee_record', {
        p_token: sessionToken,
        p_attendee_id: editingAttendeeId,
        p_updated_data: data
      });
      if (res.success) {
        showToast('Details updated');
        closeModal();
        if (currentSearchTerm) runSearch(currentSearchTerm);
      } else {
        showToast(res.error || 'Failed to update', 'error');
      }
    } else {
      const res = await callRPC('add_unlisted_attendee', {
        p_token: sessionToken,
        p_attendee_data: data
      });
      if (res.success) {
        showToast('Attendee added and checked in');
        closeModal();
        loadSummary();
        const nameVal = nameField ? data[nameField.field_key] : '';
        searchInput.value = nameVal;
        runSearch(nameVal);
      } else {
        showToast(res.error || 'Failed to add attendee', 'error');
      }
    }
  });

  // ---------- Init ----------
  async function init() {
    if (!sessionToken) { window.location.href = 'login.html'; return; }

    const role = localStorage.getItem('user_role');
    if (role !== 'usher' && role !== 'event_manager') { window.location.href = 'login.html'; return; }
    if (!eventId) {
      resultsArea.innerHTML = '<div class="empty-state">No event assigned to this account.</div>';
      return;
    }

    document.getElementById('loggedInAs').textContent = `Logged in as ${localStorage.getItem('username') || ''}`;

    await loadEventFields();
    loadSummary();
  }

  init();
</script>

</body>
</html>
