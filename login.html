<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Event Attendance</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .login-card {
    background: #ffffff;
    border-radius: 16px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .login-card h1 {
    font-size: 22px;
    color: #1e3a5f;
    margin-bottom: 4px;
    text-align: center;
  }

  .login-card p.subtitle {
    color: #718096;
    font-size: 14px;
    text-align: center;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 12px 14px;
    border: 1.5px solid #e2e8f0;
    border-radius: 10px;
    font-size: 15px;
    margin-bottom: 18px;
    transition: border-color 0.2s;
  }

  input:focus {
    outline: none;
    border-color: #2c5282;
  }

  button {
    width: 100%;
    padding: 13px;
    background: #2c5282;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }

  button:hover { background: #1e3a5f; }
  button:disabled { background: #a0aec0; cursor: not-allowed; }

  .error-msg {
    background: #fed7d7;
    color: #c53030;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: #a0aec0;
  }
</style>
</head>
<body>

<div class="login-card">
  <h1>Event Attendance</h1>
  <p class="subtitle">Associate Pastors Conference</p>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm">
    <label for="username">Username</label>
    <input type="text" id="username" autocomplete="username" required>

    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password" required>

    <button type="submit" id="submitBtn">Log In</button>
  </form>

  <p class="footer-note">Assemblies of God, Ghana — Greater Accra East</p>
</div>

<script>
  const SUPABASE_URL = 'https://ydijisbsoqqbcjssscck.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_PLI1DLUB_0DF3R0x3GPWYA_RNj2aScg';

  const form = document.getElementById('loginForm');
  const errorMsg = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');

  // If already logged in with a valid session, skip straight to the check-in page
  (async function checkExistingSession() {
    const token = localStorage.getItem('session_token');
    if (!token) return;

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/verify_session`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY
        },
        body: JSON.stringify({ p_token: token })
      });
      const data = await res.json();
      if (data.valid) {
        window.location.href = 'index.html';
      }
    } catch (e) {
      // Silent fail - just stay on login page
    }
  })();

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging in...';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/login_user`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY
        },
        body: JSON.stringify({ p_username: username, p_password: password })
      });

      const data = await res.json();

      if (data.success) {
        localStorage.setItem('session_token', data.token);
        localStorage.setItem('username', data.username);
        window.location.href = 'index.html';
      } else {
        errorMsg.textContent = data.error || 'Login failed. Please try again.';
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log In';
      }
    } catch (err) {
      errorMsg.textContent = 'Connection error. Please check your internet and try again.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Log In';
    }
  });
</script>

</body>
</html>
