<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-In - Event Attendance</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f4f6f9;
    color: #1a202c;
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
    color: white;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
  }

  header .user-info {
    font-size: 13px;
    opacity: 0.85;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header button#logoutBtn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
  }
  header button#logoutBtn:hover { background: rgba(255,255,255,0.25); }

  .summary-bar {
    background: white;
    padding: 16px 20px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    border-bottom: 1px solid #e2e8f0;
  }

  .summary-stat {
    text-align: left;
  }

  .summary-stat .num {
    font-size: 24px;
    font-weight: 700;
    color: #2c5282;
  }

  .summary-stat .label {
    font-size: 12px;
    color: #718096;
  }

  .container {
    max-width: 700px;
    margin: 0 auto;
    padding: 20px;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 8px;
  }

  #searchInput {
    width: 100%;
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    background: white;
  }

  #searchInput:focus {
    outline: none;
    border-color: #2c5282;
  }

  .suggestions {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    max-height: 360px;
    overflow-y: auto;
    z-index: 50;
    display: none;
  }

  .suggestion-item {
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 1px solid #f1f5f9;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: #f7fafc; }

  .suggestion-item .name { font-weight: 600; font-size: 14px; }
  .suggestion-item .meta { font-size: 12px; color: #718096; margin-top: 2px; }
  .suggestion-item .badge {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge.pastor { background: #e6fffa; color: #234e52; }
  .badge.other { background: #fef3e2; color: #7b5e00; }
  .badge.checked { background: #d4f8d4; color: #1a5c1a; }

  .add-new-item {
    padding: 14px 16px;
    cursor: pointer;
    background: #f0f7ff;
    color: #2c5282;
    font-weight: 600;
    font-size: 14px;
    border-top: 2px solid #e2e8f0;
  }
  .add-new-item:hover { background: #e0eeff; }

  .empty-state {
    text-align: center;
    color: #a0aec0;
    padding: 60px 20px;
    font-size: 14px;
  }

  .result-card {
    background: white;
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .result-card.checked-in {
    border-left: 4px solid #38a169;
  }

  .result-card .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 10px;
  }

  .result-card .name {
    font-size: 17px;
    font-weight: 700;
  }

  .result-card .details {
    font-size: 13px;
    color: #4a5568;
    line-height: 1.6;
  }

  .result-card .details span {
    display: inline-block;
    margin-right: 6px;
  }

  .check-in-btn {
    background: #2c5282;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .check-in-btn:hover { background: #1e3a5f; }

  .checked-status {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .checked-status .check-icon {
    color: #38a169;
    font-size: 14px;
    font-weight: 700;
  }

  .undo-btn {
    background: none;
    border: 1px solid #e2e8f0;
    color: #a0aec0;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
  }
  .undo-btn:hover { border-color: #cbd5e0; color: #718096; }

  /* Modal for adding a new attendee */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }

  .modal-overlay.active { display: flex; }

  .modal-box {
    background: white;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 420px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-box h2 {
    font-size: 18px;
    margin-bottom: 4px;
  }

  .modal-box p.sub {
    font-size: 13px;
    color: #718096;
    margin-bottom: 20px;
  }

  .modal-box label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 5px;
    margin-top: 14px;
  }

  .modal-box input, .modal-box select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid #e2e8f0;
    border-radius: 8px;
    font-size: 14px;
  }

  .modal-box input:focus, .modal-box select:focus {
    outline: none;
    border-color: #2c5282;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }

  .modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
  }

  .btn-cancel {
    background: #f1f5f9;
    color: #4a5568;
  }
  .btn-cancel:hover { background: #e2e8f0; }

  .btn-confirm {
    background: #2c5282;
    color: white;
  }
  .btn-confirm:hover { background: #1e3a5f; }

  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #1a202c;
    color: white;
    padding: 12px 24px;
    border-radius: 10px;
    font-size: 14px;
    z-index: 200;
    display: none;
  }

  .toast.success { background: #2f855a; }
  .toast.error { background: #c53030; }
</style>
</head>
<body>

<header>
  <h1>Associate Pastors Conference — Check-In</h1>
  <div class="user-info">
    <a href="admin.html" id="adminLink" style="display:none; color:white; opacity:0.85; text-decoration:none; margin-right:4px;">Admin →</a>
    <span id="loggedInAs"></span>
    <button id="logoutBtn">Log Out</button>
  </div>
</header>

<div class="summary-bar" id="summaryBar">
  <div class="summary-stat">
    <div class="num" id="totalCheckedIn">–</div>
    <div class="label">Total Checked In</div>
  </div>
  <div class="summary-stat">
    <div class="num" id="pastorsCheckedIn">–</div>
    <div class="label">Pastors Checked In</div>
  </div>
  <div class="summary-stat">
    <div class="num" id="othersCheckedIn">–</div>
    <div class="label">Others Checked In</div>
  </div>
</div>

<div class="container">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search by name or phone number..." autocomplete="off">
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div id="resultsArea">
    <div class="empty-state">Start typing a name or phone number to find an attendee.</div>
  </div>
</div>

<!-- Add new attendee modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h2>Add New Attendee</h2>
    <p class="sub">No match found — fill in their details to check them in.</p>

    <label for="newName">Full Name</label>
    <input type="text" id="newName">

    <label for="newPhone">Phone Number</label>
    <input type="text" id="newPhone">

    <label for="newCategory">Category</label>
    <select id="newCategory">
      <option value="Associate Pastor">Associate Pastor</option>
      <option value="Other">Other</option>
    </select>

    <label for="newRank">Ministerial Rank/Position</label>
    <input type="text" id="newRank" placeholder="e.g. Ordained, Licentiate, Regional Secretary">

    <label for="newChurch">Church</label>
    <input type="text" id="newChurch">

    <label for="newDistrict">District</label>
    <input type="text" id="newDistrict">

    <div class="modal-actions">
      <button class="btn-cancel" id="cancelAddBtn">Cancel</button>
      <button class="btn-confirm" id="confirmAddBtn">Add & Check In</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://ydijisbsoqqbcjssscck.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_PLI1DLUB_0DF3R0x3GPWYA_RNj2aScg';

  let debounceTimer = null;
  let currentSearchTerm = '';

  // ---------- Auth check ----------
  async function requireLogin() {
    const token = localStorage.getItem('session_token');
    const username = localStorage.getItem('username');

    if (!token) {
      window.location.href = 'login.html';
      return;
    }

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/verify_session`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ p_token: token })
      });
      const data = await res.json();
      if (!data.valid) {
        localStorage.removeItem('session_token');
        localStorage.removeItem('username');
        window.location.href = 'login.html';
      } else {
        document.getElementById('loggedInAs').textContent = `Logged in as ${username}`;
        if (data.is_admin) {
          document.getElementById('adminLink').style.display = 'inline';
        }
      }
    } catch (e) {
      window.location.href = 'login.html';
    }
  }

  document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('session_token');
    localStorage.removeItem('username');
    window.location.href = 'login.html';
  });

  // ---------- Toast ----------
  function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = `toast ${type}`;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2500);
  }

  // ---------- Summary ----------
  async function loadSummary() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_attendance_summary`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({})
      });
      const data = await res.json();
      document.getElementById('totalCheckedIn').textContent = `${data.checked_in} / ${data.total}`;
      document.getElementById('pastorsCheckedIn').textContent = `${data.pastors_checked_in} / ${data.pastors_total}`;
      document.getElementById('othersCheckedIn').textContent = `${data.others_checked_in} / ${data.others_total}`;
    } catch (e) {
      console.error('Failed to load summary', e);
    }
  }

  // ---------- Search / Autocomplete ----------
  const searchInput = document.getElementById('searchInput');
  const suggestionsBox = document.getElementById('suggestions');
  const resultsArea = document.getElementById('resultsArea');

  searchInput.addEventListener('input', () => {
    const query = searchInput.value.trim();
    currentSearchTerm = query;

    clearTimeout(debounceTimer);

    if (query.length === 0) {
      suggestionsBox.style.display = 'none';
      resultsArea.innerHTML = '<div class="empty-state">Start typing a name or phone number to find an attendee.</div>';
      return;
    }

    debounceTimer = setTimeout(() => runSearch(query), 250);
  });

  async function runSearch(query) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/search_attendees`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ p_query: query })
      });
      const results = await res.json();
      renderSuggestions(results, query);
      renderResults(results, query);
    } catch (e) {
      console.error('Search failed', e);
    }
  }

  function renderSuggestions(results, query) {
    suggestionsBox.innerHTML = '';

    results.slice(0, 8).forEach(person => {
      const item = document.createElement('div');
      item.className = 'suggestion-item';
      item.innerHTML = `
        <div>
          <div class="name">${escapeHtml(person.full_name)}</div>
          <div class="meta">${escapeHtml(person.phone || 'No phone')} ${person.church ? '· ' + escapeHtml(person.church) : ''}</div>
        </div>
        <span class="badge ${person.category === 'Associate Pastor' ? 'pastor' : 'other'}">
          ${person.checked_in ? '✓ In' : (person.category === 'Associate Pastor' ? 'Pastor' : 'Other')}
        </span>
      `;
      item.addEventListener('click', () => {
        searchInput.value = person.full_name;
        suggestionsBox.style.display = 'none';
        renderResults([person], person.full_name);
      });
      suggestionsBox.appendChild(item);
    });

    // Always show "Add new" option when there's a query, in case the person isn't found
    const addNewItem = document.createElement('div');
    addNewItem.className = 'add-new-item';
    addNewItem.textContent = `+ Add "${query}" as a new attendee`;
    addNewItem.addEventListener('click', () => {
      suggestionsBox.style.display = 'none';
      openAddModal(query);
    });
    suggestionsBox.appendChild(addNewItem);

    suggestionsBox.style.display = 'block';
  }

  function renderResults(results, query) {
    if (results.length === 0) {
      resultsArea.innerHTML = `
        <div class="empty-state">
          No attendee found matching "${escapeHtml(query)}".<br><br>
          <button class="check-in-btn" onclick="openAddModal('${escapeHtml(query).replace(/'/g, "\\'")}')">+ Add as New Attendee</button>
        </div>
      `;
      return;
    }

    resultsArea.innerHTML = '';
    results.forEach(person => {
      resultsArea.appendChild(buildResultCard(person));
    });
  }

  function buildResultCard(person) {
    const card = document.createElement('div');
    card.className = `result-card ${person.checked_in ? 'checked-in' : ''}`;

    const categoryBadge = person.category === 'Associate Pastor' ? 'pastor' : 'other';

    card.innerHTML = `
      <div class="top-row">
        <div>
          <div class="name">${escapeHtml(person.full_name)}</div>
        </div>
        <span class="badge ${categoryBadge}">${escapeHtml(person.category)}</span>
      </div>
      <div class="details">
        ${person.ministerial_rank_position ? `<span>📋 ${escapeHtml(person.ministerial_rank_position)}</span>` : ''}
        ${person.church ? `<span>⛪ ${escapeHtml(person.church)}</span>` : ''}
        ${person.district ? `<span>📍 ${escapeHtml(person.district)}</span>` : ''}<br>
        ${person.phone ? `<span>📞 ${escapeHtml(person.phone)}</span>` : ''}
      </div>
      <div style="margin-top: 12px;" class="action-row"></div>
    `;

    const actionRow = card.querySelector('.action-row');

    if (person.checked_in) {
      const checkedAt = person.checked_in_at ? new Date(person.checked_in_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
      actionRow.innerHTML = `
        <div class="checked-status">
          <span class="check-icon">✓ Checked in${checkedAt ? ' at ' + checkedAt : ''}</span>
        </div>
      `;
      const undoBtn = document.createElement('button');
      undoBtn.className = 'undo-btn';
      undoBtn.textContent = 'Undo';
      undoBtn.style.marginTop = '8px';
      undoBtn.addEventListener('click', () => undoCheckIn(person.id));
      actionRow.appendChild(undoBtn);
    } else {
      const btn = document.createElement('button');
      btn.className = 'check-in-btn';
      btn.textContent = 'Check In';
      btn.addEventListener('click', () => checkIn(person.id));
      actionRow.appendChild(btn);
    }

    return card;
  }

  async function checkIn(id) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/check_in_attendee`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ p_id: id })
      });
      const data = await res.json();
      if (data.success) {
        showToast('Checked in successfully');
        loadSummary();
        if (currentSearchTerm) runSearch(currentSearchTerm);
      } else {
        showToast(data.error || 'Failed to check in', 'error');
      }
    } catch (e) {
      showToast('Connection error', 'error');
    }
  }

  async function undoCheckIn(id) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/undo_check_in`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ p_id: id })
      });
      const data = await res.json();
      if (data.success) {
        showToast('Check-in undone');
        loadSummary();
        if (currentSearchTerm) runSearch(currentSearchTerm);
      } else {
        showToast(data.error || 'Failed to undo', 'error');
      }
    } catch (e) {
      showToast('Connection error', 'error');
    }
  }

  // ---------- Add new attendee modal ----------
  const modalOverlay = document.getElementById('modalOverlay');

  function openAddModal(prefillName) {
    document.getElementById('newName').value = prefillName || '';
    document.getElementById('newPhone').value = '';
    document.getElementById('newCategory').value = 'Associate Pastor';
    document.getElementById('newRank').value = '';
    document.getElementById('newChurch').value = '';
    document.getElementById('newDistrict').value = '';
    modalOverlay.classList.add('active');
  }

  function closeAddModal() {
    modalOverlay.classList.remove('active');
  }

  document.getElementById('cancelAddBtn').addEventListener('click', closeAddModal);

  document.getElementById('confirmAddBtn').addEventListener('click', async () => {
    const name = document.getElementById('newName').value.trim();
    if (!name) {
      showToast('Name is required', 'error');
      return;
    }

    const payload = {
      p_full_name: name,
      p_phone: document.getElementById('newPhone').value.trim() || null,
      p_ministerial_rank_position: document.getElementById('newRank').value.trim() || null,
      p_church: document.getElementById('newChurch').value.trim() || null,
      p_district: document.getElementById('newDistrict').value.trim() || null,
      p_category: document.getElementById('newCategory').value
    };

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/add_and_check_in_attendee`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.success) {
        showToast(`${name} added and checked in`);
        closeAddModal();
        loadSummary();
        searchInput.value = name;
        runSearch(name);
      } else {
        showToast(data.error || 'Failed to add attendee', 'error');
      }
    } catch (e) {
      showToast('Connection error', 'error');
    }
  });

  // Close suggestions when clicking outside
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.search-wrap')) {
      suggestionsBox.style.display = 'none';
    }
  });

  // ---------- Helpers ----------
  function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---------- Init ----------
  requireLogin();
  loadSummary();
</script>

</body>
</html>
